services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: focuslog
      POSTGRES_USER: focuslog
      POSTGRES_PASSWORD: focuslog
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U focuslog -d focuslog']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: development
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 3000
      DATABASE_URL: postgresql://focuslog:focuslog@postgres:5432/focuslog?schema=public
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
