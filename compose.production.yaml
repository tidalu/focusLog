services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set in .env.production}
      POSTGRES_USER: ${POSTGRES_USER:?set in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: ['sh', '-c', 'true']
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: 'true'
      BACKEND_HOST: 127.0.0.1
      BACKEND_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      LOG_LEVEL: warn
      REQUIRE_TLS: 'true'
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-120}
      DEVICE_AUTH_MAX_AGE_SECONDS: ${DEVICE_AUTH_MAX_AGE_SECONDS:-300}
      REQUIRE_TLS: 'true'
    ports:
      - '127.0.0.1:${BACKEND_PORT:-3000}:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health/ready').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
