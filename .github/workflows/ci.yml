name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://focuslog:focuslog@localhost:5432/focuslog?schema=public
      FOCUSLOG_INTEGRATION_DATABASE_URL: postgresql://focuslog:focuslog@localhost:5432/focuslog?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: focuslog
          POSTGRES_USER: focuslog
          POSTGRES_PASSWORD: focuslog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U focuslog -d focuslog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @focuslog/backend prisma:generate
      - run: pnpm --filter @focuslog/backend prisma:migrate:deploy
      - run: pnpm --filter @focuslog/backend prisma:migrate:status
      - run: pnpm --filter @focuslog/backend prisma:seed
      - run: pnpm format
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm contracts:check
      - run: pnpm traceability:check

  container:
    runs-on: ubuntu-latest
    needs: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: focuslog-backend:ci

  mobile:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://focuslog:focuslog@localhost:5432/focuslog_mobile_test?schema=public
      FOCUSLOG_INTEGRATION_DATABASE_URL: postgresql://focuslog:focuslog@localhost:5432/focuslog_mobile_test?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: focuslog_mobile_test
          POSTGRES_USER: focuslog
          POSTGRES_PASSWORD: focuslog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U focuslog -d focuslog_mobile_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @focuslog/backend prisma:generate
      - run: pnpm --filter @focuslog/backend prisma:migrate:deploy
      - run: pnpm --filter @focuslog/backend... build
      - name: Start real synchronization backend
        run: |
          nohup pnpm --filter @focuslog/backend start > /tmp/focuslog-backend.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/health/ready; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/focuslog-backend.log
          exit 1
      - run: flutter pub get
        working-directory: apps/mobile
      - run: dart run build_runner build --delete-conflicting-outputs
        working-directory: apps/mobile
      - run: flutter analyze
        working-directory: apps/mobile
      - run: flutter test --dart-define=FOCUSLOG_INTEGRATION_API_URL=http://127.0.0.1:3000
        working-directory: apps/mobile
      - name: Configure Android release signing
        working-directory: apps/mobile/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > focuslog-release.jks
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=../focuslog-release.jks\n'
          } > key.properties
      - run: >-
          flutter build apk --release
          --dart-define=FOCUSLOG_API_URL=https://focuslog-backend.onrender.com
        working-directory: apps/mobile
      - uses: actions/upload-artifact@v4
        with:
          name: focuslog-android-release-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
